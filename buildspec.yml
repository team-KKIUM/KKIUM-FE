version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - corepack enable
      - corepack prepare pnpm@9.12.3 --activate
      - pnpm --version
      - pnpm install --frozen-lockfile

  build:
    commands:
      - pnpm test:unit
      - pnpm build

  post_build:
    commands:
      - chmod +x scripts/s3-sync-with-cache.sh
      - |
        if [ -n "${S3_BUCKET:-}" ]; then
          ./scripts/s3-sync-with-cache.sh out
        else
          echo "S3_BUCKET not set — skipping S3 deploy (artifact-only). Set S3_BUCKET in CodeBuild to apply cache + gzip HTML headers."
        fi

artifacts:
  base-directory: out
  files:
    - '**/*'
