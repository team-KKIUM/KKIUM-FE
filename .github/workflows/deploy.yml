name: deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  AWS_DEFAULT_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::930611865671:role/kkium-code-deploy
          aws-region: ap-northeast-2

      - name: Start pipeline
        id: start
        env:
          AWS_REGION: ap-northeast-2
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          EXEC_ID=$(aws codepipeline start-pipeline-execution \
            --region ap-northeast-2 \
            --name kkium-pipeline \
            --query 'pipelineExecutionId' \
            --output text)
          echo "execution_id=$EXEC_ID" >> $GITHUB_OUTPUT
          echo "Started execution: $EXEC_ID"

      - name: Watch pipeline status
        env:
          AWS_REGION: ap-northeast-2
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          PIPELINE_NAME="kkium-pipeline"
          EXEC_ID="${{ steps.start.outputs.execution_id }}"

          echo "Watching pipeline: $PIPELINE_NAME (region: ap-northeast-2)"
          echo "Execution ID: $EXEC_ID"

          for i in {1..120}; do
            STATUS=$(aws codepipeline get-pipeline-execution \
              --region ap-northeast-2 \
              --pipeline-name "$PIPELINE_NAME" \
              --pipeline-execution-id "$EXEC_ID" \
              --query 'pipelineExecution.status' \
              --output text)

            LAST_UPDATE=$(aws codepipeline get-pipeline-execution \
              --region ap-northeast-2 \
              --pipeline-name "$PIPELINE_NAME" \
              --pipeline-execution-id "$EXEC_ID" \
              --query 'pipelineExecution.lastUpdateTime' \
              --output text)

            echo "[$i] status=$STATUS, lastUpdate=$LAST_UPDATE"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "Pipeline succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Superseded" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Pipeline ended with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for pipeline completion."
          exit 1
