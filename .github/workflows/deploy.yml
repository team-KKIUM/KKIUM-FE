name: deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::930611865671:role/kkium-code-deploy
          aws-region: us-east-1

      - name: Start pipeline
        id: start
        run: |
          EXEC_ID=$(aws codepipeline start-pipeline-execution \
            --region us-east-1 \
            --name kkium-pipeline \
            --query 'pipelineExecutionId' \
            --output text)
          echo "execution_id=$EXEC_ID" >> $GITHUB_OUTPUT
          echo "Started execution: $EXEC_ID"

      - name: Watch pipeline status
        run: |
          PIPELINE_NAME="kkium-pipeline"
          EXEC_ID="${{ steps.start.outputs.execution_id }}"

          for i in {1..120}; do
            STATUS=$(aws codepipeline get-pipeline-execution \
              --region us-east-1 \
              --pipeline-name "$PIPELINE_NAME" \
              --pipeline-execution-id "$EXEC_ID" \
              --query 'pipelineExecution.status' \
              --output text)

            echo "[$i] status=$STATUS"

            if [ "$STATUS" = "Succeeded" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Superseded" ] || [ "$STATUS" = "Cancelled" ]; then exit 1; fi
            sleep 15
          done
          exit 1
